<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400" fill="none">
  <rect width="500" height="400" fill="#0A0A0B"/>

  <!-- Outer connection lines (faint web) -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.08">
    <line x1="80" y1="90" x2="180" y2="120"/>
    <line x1="80" y1="90" x2="120" y2="200"/>
    <line x1="420" y1="90" x2="320" y2="120"/>
    <line x1="420" y1="90" x2="380" y2="200"/>
    <line x1="80" y1="310" x2="180" y2="280"/>
    <line x1="80" y1="310" x2="120" y2="200"/>
    <line x1="420" y1="310" x2="320" y2="280"/>
    <line x1="420" y1="310" x2="380" y2="200"/>
    <line x1="250" y1="50" x2="180" y2="120"/>
    <line x1="250" y1="50" x2="320" y2="120"/>
    <line x1="250" y1="350" x2="180" y2="280"/>
    <line x1="250" y1="350" x2="320" y2="280"/>
  </g>

  <!-- Mid-layer connection lines -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.15">
    <line x1="180" y1="120" x2="250" y2="200"/>
    <line x1="320" y1="120" x2="250" y2="200"/>
    <line x1="120" y1="200" x2="250" y2="200"/>
    <line x1="380" y1="200" x2="250" y2="200"/>
    <line x1="180" y1="280" x2="250" y2="200"/>
    <line x1="320" y1="280" x2="250" y2="200"/>
    <line x1="180" y1="120" x2="320" y2="120"/>
    <line x1="180" y1="280" x2="320" y2="280"/>
    <line x1="120" y1="200" x2="180" y2="120"/>
    <line x1="120" y1="200" x2="180" y2="280"/>
    <line x1="380" y1="200" x2="320" y2="120"/>
    <line x1="380" y1="200" x2="320" y2="280"/>
  </g>

  <!-- Inner connection lines (brighter) -->
  <g stroke="#00E5A0" stroke-width="1.5" opacity="0.3">
    <line x1="200" y1="160" x2="250" y2="200"/>
    <line x1="300" y1="160" x2="250" y2="200"/>
    <line x1="200" y1="240" x2="250" y2="200"/>
    <line x1="300" y1="240" x2="250" y2="200"/>
    <line x1="200" y1="160" x2="300" y2="160"/>
    <line x1="200" y1="240" x2="300" y2="240"/>
    <line x1="200" y1="160" x2="200" y2="240"/>
    <line x1="300" y1="160" x2="300" y2="240"/>
  </g>

  <!-- Outermost person-nodes (faint) -->
  <g opacity="0.15">
    <!-- Top -->
    <circle cx="250" cy="50" r="8" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="250" cy="46" r="3" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Top-left -->
    <circle cx="80" cy="90" r="8" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="80" cy="86" r="3" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Top-right -->
    <circle cx="420" cy="90" r="8" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="420" cy="86" r="3" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Bottom-left -->
    <circle cx="80" cy="310" r="8" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="80" cy="306" r="3" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Bottom-right -->
    <circle cx="420" cy="310" r="8" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="420" cy="306" r="3" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Bottom -->
    <circle cx="250" cy="350" r="8" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="250" cy="346" r="3" stroke="#00E5A0" stroke-width="1" fill="none"/>
  </g>

  <!-- Mid-ring person-nodes -->
  <g opacity="0.35">
    <!-- Top-left -->
    <circle cx="180" cy="120" r="12" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="180" cy="115" r="4" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <path d="M 172,128 Q 180,132 188,128" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Top-right -->
    <circle cx="320" cy="120" r="12" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="320" cy="115" r="4" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <path d="M 312,128 Q 320,132 328,128" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Left -->
    <circle cx="120" cy="200" r="12" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="120" cy="195" r="4" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <path d="M 112,208 Q 120,212 128,208" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Right -->
    <circle cx="380" cy="200" r="12" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="380" cy="195" r="4" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <path d="M 372,208 Q 380,212 388,208" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Bottom-left -->
    <circle cx="180" cy="280" r="12" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="180" cy="275" r="4" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <path d="M 172,288 Q 180,292 188,288" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <!-- Bottom-right -->
    <circle cx="320" cy="280" r="12" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="320" cy="275" r="4" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <path d="M 312,288 Q 320,292 328,288" stroke="#00E5A0" stroke-width="1" fill="none"/>
  </g>

  <!-- Inner ring person-nodes -->
  <g opacity="0.6">
    <circle cx="200" cy="160" r="10" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="200" cy="156" r="3.5" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <circle cx="300" cy="160" r="10" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="300" cy="156" r="3.5" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <circle cx="200" cy="240" r="10" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="200" cy="236" r="3.5" stroke="#00E5A0" stroke-width="1" fill="none"/>
    <circle cx="300" cy="240" r="10" stroke="#00E5A0" stroke-width="1.5" fill="none"/>
    <circle cx="300" cy="236" r="3.5" stroke="#00E5A0" stroke-width="1" fill="none"/>
  </g>

  <!-- Central hub node (brightest) -->
  <g>
    <circle cx="250" cy="200" r="20" stroke="#00E5A0" stroke-width="2" fill="none" opacity="0.5"/>
    <circle cx="250" cy="200" r="14" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.3"/>
    <circle cx="250" cy="195" r="5" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.8"/>
    <path d="M 240,208 Q 250,214 260,208" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.8"/>
    <circle cx="250" cy="200" r="3" fill="#00E5A0" opacity="0.2"/>
  </g>

  <!-- Pulse rings around center -->
  <circle cx="250" cy="200" r="30" stroke="#00E5A0" stroke-width="0.5" fill="none" opacity="0.1"/>
  <circle cx="250" cy="200" r="45" stroke="#00E5A0" stroke-width="0.5" fill="none" opacity="0.05"/>

  <!-- Corner brackets -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.15">
    <path d="M 15,15 L 15,40" fill="none"/>
    <path d="M 15,15 L 40,15" fill="none"/>
    <path d="M 485,15 L 485,40" fill="none"/>
    <path d="M 485,15 L 460,15" fill="none"/>
    <path d="M 15,385 L 15,360" fill="none"/>
    <path d="M 15,385 L 40,385" fill="none"/>
    <path d="M 485,385 L 485,360" fill="none"/>
    <path d="M 485,385 L 460,385" fill="none"/>
  </g>
</svg>