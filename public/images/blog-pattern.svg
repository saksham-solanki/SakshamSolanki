  <!-- Connecting lines between some dots (sparse network overlay) -->
  <g stroke="#00E5A0" stroke-width="0.5" opacity="0.07">
    <!-- Cluster 1 -->
    <line x1="110" y1="60" x2="150" y2="100"/>
    <line x1="150" y1="100" x2="190" y2="60"/>
    <line x1="110" y1="60" x2="190" y2="60"/>
    <!-- Cluster 2 -->
    <line x1="350" y1="100" x2="390" y2="60"/>
    <line x1="390" y1="60" x2="430" y2="100"/>
    <line x1="350" y1="100" x2="430" y2="100"/>
    <line x1="390" y1="60" x2="390" y2="140"/>
    <!-- Cluster 3 -->
    <line x1="630" y1="60" x2="670" y2="100"/>
    <line x1="670" y1="100" x2="710" y2="60"/>
    <line x1="670" y1="100" x2="670" y2="140"/>
    <line x1="630" y1="140" x2="710" y2="140"/>
    <!-- Cluster 4 -->
    <line x1="910" y1="60" x2="950" y2="100"/>
    <line x1="950" y1="100" x2="990" y2="60"/>
    <line x1="910" y1="60" x2="990" y2="60"/>
    <line x1="950" y1="100" x2="910" y2="140"/>
    <line x1="950" y1="100" x2="990" y2="140"/>
  </g>

  <!-- Slightly brighter accent dots at network junctions -->
  <g fill="#00E5A0" opacity="0.1">
    <circle cx="150" cy="100" r="2.5"/>
    <circle cx="390" cy="100" r="2.5"/>
    <circle cx="670" cy="100" r="2.5"/>
    <circle cx="950" cy="100" r="2.5"/>
  </g>

  <!-- Horizontal accent lines (very subtle) -->
  <g stroke="#00E5A0" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
  </g>
