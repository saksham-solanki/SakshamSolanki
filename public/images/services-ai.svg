<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="transparent"/>

  <!-- Outer neural connections (faint) -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.1">
    <line x1="40" y1="50" x2="70" y2="70"/>
    <line x1="160" y1="50" x2="130" y2="70"/>
    <line x1="40" y1="150" x2="70" y2="130"/>
    <line x1="160" y1="150" x2="130" y2="130"/>
    <line x1="100" y1="30" x2="100" y2="60"/>
    <line x1="100" y1="170" x2="100" y2="140"/>
  </g>

  <!-- Outer nodes -->
  <g>
    <circle cx="40" cy="50" r="4" stroke="#00E5A0" stroke-width="1" fill="none" opacity="0.15"/>
    <circle cx="160" cy="50" r="4" stroke="#00E5A0" stroke-width="1" fill="none" opacity="0.15"/>
    <circle cx="40" cy="150" r="4" stroke="#00E5A0" stroke-width="1" fill="none" opacity="0.15"/>
    <circle cx="160" cy="150" r="4" stroke="#00E5A0" stroke-width="1" fill="none" opacity="0.15"/>
    <circle cx="100" cy="30" r="4" stroke="#00E5A0" stroke-width="1" fill="none" opacity="0.15"/>
    <circle cx="100" cy="170" r="4" stroke="#00E5A0" stroke-width="1" fill="none" opacity="0.15"/>
  </g>

  <!-- Brain outline (abstract, two hemispheres) -->
  <g stroke="#00E5A0" stroke-width="1.5" fill="none">
    <!-- Left hemisphere -->
    <path d="M 100,60 Q 65,60 60,85 Q 55,110 70,125 Q 80,140 100,140" opacity="0.5"/>
    <!-- Right hemisphere -->
    <path d="M 100,60 Q 135,60 140,85 Q 145,110 130,125 Q 120,140 100,140" opacity="0.5"/>
    <!-- Center divide -->
    <line x1="100" y1="65" x2="100" y2="135" opacity="0.2"/>
  </g>

  <!-- Internal network nodes (brain network) -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.4">
    <!-- Left side connections -->
    <line x1="80" y1="80" x2="90" y2="95"/>
    <line x1="75" y1="105" x2="90" y2="95"/>
    <line x1="80" y1="80" x2="75" y2="105"/>
    <line x1="85" y1="120" x2="75" y2="105"/>
    <line x1="85" y1="120" x2="90" y2="95"/>
    <!-- Right side connections -->
    <line x1="120" y1="80" x2="110" y2="95"/>
    <line x1="125" y1="105" x2="110" y2="95"/>
    <line x1="120" y1="80" x2="125" y2="105"/>
    <line x1="115" y1="120" x2="125" y2="105"/>
    <line x1="115" y1="120" x2="110" y2="95"/>
    <!-- Cross connections -->
    <line x1="90" y1="95" x2="110" y2="95"/>
    <line x1="85" y1="120" x2="115" y2="120"/>
  </g>

  <!-- Internal nodes -->
  <g fill="#00E5A0">
    <circle cx="80" cy="80" r="3" opacity="0.5"/>
    <circle cx="120" cy="80" r="3" opacity="0.5"/>
    <circle cx="90" cy="95" r="3" opacity="0.7"/>
    <circle cx="110" cy="95" r="3" opacity="0.7"/>
    <circle cx="75" cy="105" r="2.5" opacity="0.4"/>
    <circle cx="125" cy="105" r="2.5" opacity="0.4"/>
    <circle cx="85" cy="120" r="2.5" opacity="0.4"/>
    <circle cx="115" cy="120" r="2.5" opacity="0.4"/>
  </g>

  <!-- Central pulse -->
  <circle cx="100" cy="100" r="3" fill="#00E5A0" opacity="0.9"/>
  <circle cx="100" cy="100" r="8" stroke="#00E5A0" stroke-width="1" fill="none" opacity="0.2"/>
</svg>