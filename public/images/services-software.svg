<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="transparent"/>

  <!-- Architecture blocks - stacked/connected -->
  <g stroke="#00E5A0" stroke-width="1.5" fill="none">
    <!-- Top block -->
    <rect x="70" y="35" width="60" height="30" rx="3" opacity="0.6"/>
    <!-- Middle row blocks -->
    <rect x="40" y="85" width="50" height="30" rx="3" opacity="0.4"/>
    <rect x="110" y="85" width="50" height="30" rx="3" opacity="0.4"/>
    <!-- Bottom block (wider - foundation) -->
    <rect x="50" y="135" width="100" height="30" rx="3" opacity="0.5"/>
  </g>

  <!-- Connection lines between blocks -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.3">
    <!-- Top to middle-left -->
    <line x1="85" y1="65" x2="65" y2="85"/>
    <!-- Top to middle-right -->
    <line x1="115" y1="65" x2="135" y2="85"/>
    <!-- Middle-left to bottom -->
    <line x1="65" y1="115" x2="80" y2="135"/>
    <!-- Middle-right to bottom -->
    <line x1="135" y1="115" x2="120" y2="135"/>
    <!-- Middle to middle -->
    <line x1="90" y1="100" x2="110" y2="100"/>
  </g>

  <!-- Code bracket symbols inside blocks -->
  <g stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.7">
    <!-- Top block: angle brackets < > -->
    <path d="M 90,45 L 85,50 L 90,55"/>
    <path d="M 110,45 L 115,50 L 110,55"/>
    <!-- Dot between -->
    <circle cx="100" cy="50" r="1.5" fill="#00E5A0" opacity="0.7"/>
  </g>

  <!-- Small dots inside mid blocks -->
  <g fill="#00E5A0" opacity="0.4">
    <circle cx="55" cy="97" r="2"/><circle cx="65" cy="97" r="2"/><circle cx="75" cy="97" r="2"/>
    <circle cx="125" cy="97" r="2"/><circle cx="135" cy="97" r="2"/><circle cx="145" cy="97" r="2"/>
  </g>

  <!-- Bottom block: horizontal lines (data/layers) -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.3">
    <line x1="60" y1="145" x2="140" y2="145"/>
    <line x1="60" y1="150" x2="130" y2="150"/>
    <line x1="60" y1="155" x2="120" y2="155"/>
  </g>

  <!-- Connection dots at junctions -->
  <g fill="#00E5A0" opacity="0.5">
    <circle cx="85" cy="65" r="2"/>
    <circle cx="115" cy="65" r="2"/>
    <circle cx="65" cy="115" r="2"/>
    <circle cx="135" cy="115" r="2"/>
    <circle cx="100" cy="100" r="2.5" opacity="0.8"/>
  </g>
</svg>