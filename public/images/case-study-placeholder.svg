<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300" fill="none">
  <rect width="600" height="300" fill="#0A0A0B"/>

  <!-- Grid lines -->
  <g stroke="#00E5A0" stroke-width="0.5" opacity="0.05">
    <line x1="80" y1="40" x2="80" y2="260"/>
    <line x1="160" y1="40" x2="160" y2="260"/>
    <line x1="240" y1="40" x2="240" y2="260"/>
    <line x1="320" y1="40" x2="320" y2="260"/>
    <line x1="400" y1="40" x2="400" y2="260"/>
    <line x1="480" y1="40" x2="480" y2="260"/>
    <line x1="560" y1="40" x2="560" y2="260"/>
    <line x1="50" y1="60" x2="570" y2="60"/>
    <line x1="50" y1="110" x2="570" y2="110"/>
    <line x1="50" y1="160" x2="570" y2="160"/>
    <line x1="50" y1="210" x2="570" y2="210"/>
  </g>

  <!-- Baseline / X-axis -->
  <line x1="50" y1="260" x2="570" y2="260" stroke="#71717A" stroke-width="1" opacity="0.3"/>
  <!-- Y-axis -->
  <line x1="50" y1="40" x2="50" y2="260" stroke="#71717A" stroke-width="1" opacity="0.3"/>

  <!-- Bar chart bars -->
  <g opacity="0.2">
    <rect x="75" y="180" width="30" height="80" fill="#00E5A0" rx="2"/>
    <rect x="125" y="150" width="30" height="110" fill="#00E5A0" rx="2"/>
    <rect x="175" y="120" width="30" height="140" fill="#00E5A0" rx="2"/>
    <rect x="225" y="140" width="30" height="120" fill="#00E5A0" rx="2"/>
  </g>
  <g opacity="0.4">
    <rect x="275" y="100" width="30" height="160" fill="#00E5A0" rx="2"/>
    <rect x="325" y="80" width="30" height="180" fill="#00E5A0" rx="2"/>
  </g>
  <g opacity="0.6">
    <rect x="375" y="70" width="30" height="190" fill="#00E5A0" rx="2"/>
    <rect x="425" y="90" width="30" height="170" fill="#00E5A0" rx="2"/>
  </g>
  <g opacity="0.8">
    <rect x="475" y="60" width="30" height="200" fill="#00E5A0" rx="2"/>
    <rect x="525" y="50" width="30" height="210" fill="#00E5A0" rx="2"/>
  </g>

  <!-- Trend line -->
  <polyline points="90,175 140,145 190,115 240,135 290,95 340,75 390,65 440,85 490,55 540,45"
    stroke="#FAFAFA" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Trend line dots -->
  <g fill="#FAFAFA" opacity="0.8">
    <circle cx="90" cy="175" r="3"/>
    <circle cx="140" cy="145" r="3"/>
    <circle cx="190" cy="115" r="3"/>
    <circle cx="240" cy="135" r="3"/>
    <circle cx="290" cy="95" r="3"/>
    <circle cx="340" cy="75" r="3"/>
    <circle cx="390" cy="65" r="3"/>
    <circle cx="440" cy="85" r="3"/>
    <circle cx="490" cy="55" r="3"/>
    <circle cx="540" cy="45" r="3"/>
  </g>

  <!-- Secondary trend line (dashed) -->
  <polyline points="90,200 140,185 190,170 240,175 290,155 340,140 390,130 440,135 490,120 540,100"
    stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.3" stroke-dasharray="6 4"/>

  <!-- Metric callout box -->
  <g>
    <rect x="430" y="140" width="120" height="50" rx="4" stroke="#00E5A0" stroke-width="1" fill="#0A0A0B" opacity="0.8"/>
    <text x="490" y="160" text-anchor="middle" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" opacity="0.9">+340%</text>
    <text x="490" y="178" text-anchor="middle" fill="#71717A" font-family="system-ui, -apple-system, sans-serif" font-size="10">EFFICIENCY</text>
  </g>

  <!-- Y-axis labels -->
  <g fill="#71717A" font-family="system-ui, -apple-system, sans-serif" font-size="9" opacity="0.5">
    <text x="42" y="63" text-anchor="end">100</text>
    <text x="42" y="113" text-anchor="end">75</text>
    <text x="42" y="163" text-anchor="end">50</text>
    <text x="42" y="213" text-anchor="end">25</text>
    <text x="42" y="263" text-anchor="end">0</text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00E5A0" stroke-width="1.5" opacity="0.2">
    <path d="M 12,12 L 12,35" fill="none"/>
    <path d="M 12,12 L 35,12" fill="none"/>
    <path d="M 588,12 L 588,35" fill="none"/>
    <path d="M 588,12 L 565,12" fill="none"/>
    <path d="M 12,288 L 12,265" fill="none"/>
    <path d="M 12,288 L 35,288" fill="none"/>
    <path d="M 588,288 L 588,265" fill="none"/>
    <path d="M 588,288 L 565,288" fill="none"/>
  </g>
</svg>