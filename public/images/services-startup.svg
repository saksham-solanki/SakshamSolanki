<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="transparent"/>

  <!-- Launch pad base -->
  <g stroke="#00E5A0" stroke-width="1.5" fill="none">
    <line x1="60" y1="155" x2="140" y2="155" opacity="0.4"/>
    <line x1="70" y1="162" x2="130" y2="162" opacity="0.25"/>
  </g>

  <!-- Launch pad supports -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.2">
    <line x1="75" y1="155" x2="75" y2="162"/>
    <line x1="100" y1="155" x2="100" y2="162"/>
    <line x1="125" y1="155" x2="125" y2="162"/>
  </g>

  <!-- Rocket body (abstract/geometric) -->
  <g stroke="#00E5A0" stroke-width="1.5" fill="none">
    <!-- Main body -->
    <path d="M 92,145 L 92,80 Q 92,55 100,45 Q 108,55 108,80 L 108,145" opacity="0.7"/>
    <!-- Nose tip -->
    <circle cx="100" cy="45" r="2" fill="#00E5A0" opacity="0.9"/>
    <!-- Left fin -->
    <path d="M 92,130 L 78,150 L 92,145" opacity="0.4"/>
    <!-- Right fin -->
    <path d="M 108,130 L 122,150 L 108,145" opacity="0.4"/>
    <!-- Window/viewport -->
    <circle cx="100" cy="90" r="6" opacity="0.5"/>
    <circle cx="100" cy="90" r="3" opacity="0.3"/>
  </g>

  <!-- Thrust/exhaust lines -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.3">
    <line x1="96" y1="148" x2="93" y2="155"/>
    <line x1="100" y1="148" x2="100" y2="155"/>
    <line x1="104" y1="148" x2="107" y2="155"/>
  </g>

  <!-- Exhaust particles -->
  <g fill="#00E5A0">
    <circle cx="95" cy="158" r="1.5" opacity="0.2"/>
    <circle cx="100" cy="160" r="2" opacity="0.15"/>
    <circle cx="105" cy="158" r="1.5" opacity="0.2"/>
    <circle cx="98" cy="165" r="1" opacity="0.1"/>
    <circle cx="103" cy="164" r="1" opacity="0.1"/>
  </g>

  <!-- Speed/trajectory lines -->
  <g stroke="#00E5A0" stroke-width="1" opacity="0.15">
    <line x1="85" y1="60" x2="75" y2="45"/>
    <line x1="115" y1="60" x2="125" y2="45"/>
    <line x1="88" y1="75" x2="70" y2="65"/>
    <line x1="112" y1="75" x2="130" y2="65"/>
  </g>

  <!-- Stars/sparkles -->
  <g fill="#00E5A0">
    <circle cx="55" cy="40" r="1.5" opacity="0.2"/>
    <circle cx="145" cy="35" r="1" opacity="0.15"/>
    <circle cx="40" cy="80" r="1" opacity="0.1"/>
    <circle cx="160" cy="70" r="1.5" opacity="0.1"/>
    <circle cx="150" cy="100" r="1" opacity="0.15"/>
    <circle cx="50" cy="110" r="1" opacity="0.1"/>
  </g>

  <!-- Upward trajectory arc (dotted) -->
  <path d="M 100,45 Q 100,25 115,20" stroke="#00E5A0" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="3 3"/>
</svg>